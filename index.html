<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Şarkı Sözü Çevirici</title>
    <style>
        /* Tüm stil (CSS) kodlarımız tek dosyada */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #181818;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #282828;
        }
        h1 {
            color: #1DB954; /* Spotify Yeşili */
            margin-bottom: 20px;
            font-size: 24px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #b3b3b3;
            font-size: 14px;
        }
        textarea {
            width: 100%;
            height: 120px;
            background: #282828;
            border: 1px solid #404040;
            border-radius: 8px;
            color: white;
            padding: 12px;
            box-sizing: border-box;
            resize: none;
            font-size: 14px;
        }
        textarea:focus {
            outline: none;
            border-color: #1DB954;
        }
        button {
            width: 100%;
            background-color: #1DB954;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            background-color: #1ed760;
            transform: scale(1.02);
        }
        .output-box {
            margin-top: 25px;
            padding: 15px;
            background: #282828;
            border-radius: 8px;
            text-align: left;
            min-height: 80px;
            border: 1px dashed #404040;
        }
        .output-box h3 {
            margin-top: 0;
            color: #1DB954;
            font-size: 16px;
        }
        #translation-result {
            color: #e5e5e5;
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎵 Şarkı Sözü Çevirici</h1>
        <p style="color: #b3b3b3; font-size: 14px; margin-bottom: 25px;">
            Yabancı şarkı sözlerini yapıştır, anında Türkçe çevirisini al!
        </p>

        <div class="input-group">
            <label for="lyrics-input">Şarkı Sözlerini Buraya Yapıştır:</label>
            <textarea id="lyrics-input" placeholder="Örn: Yesterday, all my troubles seemed so far away..."></textarea>
        </div>

        <button onclick="ceviriyiYap()">Çeviriyi Başlat</button>

        <div class="output-box">
            <h3>Türkçe Çevirisi:</h3>
            <div id="translation-result">Henüz bir söz girilmedi...</div>
        </div>
    </div>

    <script>
        // Tüm çalışma mantığı (JavaScript) tek dosyada
        function ceviriyiYap() {
            const input = document.getElementById('lyrics-input').value.trim();
            const resultBox = document.getElementById('translation-result');

            if (!input) {
                resultBox.innerText = "Lütfen önce bir şarkı sözü gir kanka! 😊";
                return;
            }

            resultBox.innerText = "Çeviriliyor... (Bu bir demo arayüzüdür, arka plan servisi entegre edilebilir)";
            
            // Simülasyon olarak basit bir çeviri animasyonu/gösterimi yapıyoruz
            setTimeout(() => {
                resultBox.innerHTML = `<strong>[ÇEVİRİ BAŞARILI]</strong>\n\nGirdiğin şarkı sözleri başarıyla algılandı!\n\nBu uygulamanın APK halini telefonuna kurduktan sonra, gerçek zamanlı çeviri API'sini de buraya bağlayıp canavar gibi kullanabilirsin kanka.`;
            }, 1000);
        }
    </script>

</body>
</html>
